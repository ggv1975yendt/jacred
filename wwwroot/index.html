<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TorrentSeek — Поиск торрентов</title>
<script>(function(){var t=localStorage.getItem('theme');if(t)document.documentElement.setAttribute('data-theme',t);})();</script>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div class="container">
  <header class="index-header">
    <div class="header-controls">
      <a class="admin-link" id="admin-link" href="/admin">

        </svg>

  <div class="sort-bar">

</div>

<!-- TorrServer settings modal -->

          </button>

      <button class="back-link" id="ts-modal-cancel" type="button" style="padding:8px 16px">Отмена</button>
    </div>

<script>
const TRACKERS        = {{.TrackersJSON}};
const ADMIN_HIDDEN    = {{.AdminHidden}};
const ENABLE_PLAYBACK = {{.EnablePlayback}};

// ─── Theme toggle ──────────────────────────────────────────
(function() {
  var SUN = '<svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M12 7c-2.76 0-5 2.24-5 5s2.24 5 5 5 5-2.24 5-5-2.24-5-5-5zM2 13h2c.55 0 1-.45 1-1s-.45-1-1-1H2c-.55 0-1 .45-1 1s.45 1 1 1zm18 0h2c.55 0 1-.45 1-1s-.45-1-1-1h-2c-.55 0-1 .45-1 1s.45 1 1 1zM11 2v2c0 .55.45 1 1 1s1-.45 1-1V2c0-.55-.45-1-1-1s-1 .45-1 1zm0 18v2c0 .55.45 1 1 1s1-.45 1-1v-2c0-.55-.45-1-1-1s-1 .45-1 1zM5.99 4.58c-.39-.39-1.03-.39-1.41 0-.39.39-.39 1.03 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0s.39-1.03 0-1.41L5.99 4.58zm12.37 12.37c-.39-.39-1.03-.39-1.41 0-.39.39-.39 1.03 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0 .39-.39.39-1.03 0-1.41l-1.06-1.06zm1.06-10.96c.39-.39.39-1.03 0-1.41-.39-.39-1.03-.39-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06zM7.05 18.36c.39-.39.39-1.03 0-1.41-.39-.39-1.03-.39-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06z"/></svg>';
  var MOON = '<svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M12 3c-4.97 0-9 4.03-9 9s4.03 9 9 9 9-4.03 9-9c0-.46-.04-.92-.1-1.36-.98 1.37-2.58 2.26-4.4 2.26-2.98 0-5.4-2.42-5.4-5.4 0-1.81.89-3.42 2.26-4.4-.44-.06-.9-.1-1.36-.1z"/></svg>';

  function applyTheme(theme) {
    var btn = document.getElementById('themeToggle');
    if (theme === 'light') {
      document.documentElement.setAttribute('data-theme', 'light');
      btn.innerHTML = MOON + ' Тёмная';
    } else {
      document.documentElement.removeAttribute('data-theme');
      btn.innerHTML = SUN + ' Светлая';
    }
    try { localStorage.setItem('theme', theme); } catch(e) {}
  }

  var current = document.documentElement.getAttribute('data-theme') || 'dark';
  applyTheme(current);

  document.getElementById('themeToggle').addEventListener('click', function() {
    applyTheme(document.documentElement.getAttribute('data-theme') === 'light' ? 'dark' : 'light');
  });
})();

// ─── Tracker bar ───────────────────────────────────────────
let enabledTrackers = new Set(TRACKERS);
let trackerStatus   = {};

function fmtTime(iso) {
  if (!iso) return '';
  try { return new Date(iso).toLocaleTimeString(); } catch(e) { return ''; }
}

function renderTrackerBar() {
  const bar = document.getElementById('trackers-bar');
  if (!bar || TRACKERS.length === 0) return;
  bar.innerHTML = '';

  TRACKERS.forEach(name => {
    const st = trackerStatus[name];
    const on = enabledTrackers.has(name);

    let dotCls = 'tracker-indicator ';
    let tip    = name;
    if (!st) {
      dotCls += 'unknown';
      tip += ' · статус неизвестен';
    } else if (st.available) {
      dotCls += 'online';
      tip += ' · доступен · ' + fmtTime(st.checked_at);
    } else {
      dotCls += 'offline';
      tip += ' · недоступен · ' + fmtTime(st.checked_at);
    }

    const btn = document.createElement('button');
    btn.type      = 'button';
    btn.className = 'tracker-btn' + (on ? ' active' : '');
    btn.title     = tip;

    const dot = document.createElement('span');
    dot.className = dotCls;
    btn.appendChild(dot);
    btn.appendChild(document.createTextNode(name));

    btn.addEventListener('click', () => {
      if (enabledTrackers.has(name)) {
        enabledTrackers.delete(name);
        btn.classList.remove('active');
      } else {
        enabledTrackers.add(name);
        btn.classList.add('active');
      }
    });

    bar.appendChild(btn);
  });
}

async function fetchTrackerStatus() {
  try {
    const resp = await fetch('/api/trackers/status');
    if (resp.ok) {
      trackerStatus = await resp.json();
      renderTrackerBar();
    }
  } catch(e) {}
}

// ─── Utilities ─────────────────────────────────────────────
function esc(s) {
  return String(s ?? '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function parseSize(str) {
  const s = (str || '').trim();
  if (!s || s === '—') return 0;
  const units = { B: 1, KB: 1024, MB: 1048576, GB: 1073741824, TB: 1099511627776 };
  const m = s.match(/([0-9.,]+)\s*([A-Za-z]+)/);
  if (!m) return 0;
  return parseFloat(m[1].replace(',', '.')) * (units[m[2].toUpperCase()] || 1);
}

function parseNum(str) {
  const n = parseInt((str || '').replace(/[^0-9]/g, ''), 10);
  return isNaN(n) ? 0 : n;
}

// ─── SVG icons ─────────────────────────────────────────────
const SVG_MAGNET   = '<svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C8.13 2 5 5.13 5 9v4h2V9c0-2.76 2.24-5 5-5s5 2.24 5 5v4h2V9c0-3.87-3.13-7-7-7zm-1 10v8h2v-8h-2z"/></svg>';
const SVG_COPY     = '<svg width="10" height="10" viewBox="0 0 24 24" fill="currentColor"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg>';
const SVG_CHECK    = '<svg width="10" height="10" viewBox="0 0 24 24" fill="currentColor"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>';
const SVG_TS_SEND  = '<svg width="11" height="11" viewBox="0 0 24 24" fill="currentColor"><path d="M9 16h6v-6h4l-7-7-7 7h4v6zm-4 2h14v2H5v-2z"/></svg>';
const SVG_TS_PLAY  = '<svg width="11" height="11" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>';
const SVG_TS_SPIN  = '<span class="ts-spin"></span>';

// ─── Copy magnet ───────────────────────────────────────────
function copyMagnet(btn, magnet) {
  navigator.clipboard.writeText(magnet || '').then(() => {
    btn.classList.add('copied');
    btn.innerHTML = SVG_CHECK;
    setTimeout(() => { btn.classList.remove('copied'); btn.innerHTML = SVG_COPY; }, 2000);
  });
}

// ─── Table sorting ─────────────────────────────────────────
// Sort values are stored as data-sort-* attributes on each <tr>,
// set at render time — no DOM text parsing needed during sort.
function initTableSorting(table) {
  const headers = table.querySelectorAll('th[data-sortable]');
  const tbody   = table.querySelector('tbody');
  if (!tbody) return;

  headers.forEach(header => {
    header.addEventListener('click', function() {
      const key = this.dataset.sortable;
      const asc = !this.classList.contains('sort-asc');

      headers.forEach(h => h.classList.remove('active', 'sort-asc', 'sort-desc'));
      this.classList.add('active', asc ? 'sort-asc' : 'sort-desc');

      // dataset key: sortName, sortSize, sortSeeds, sortPeers
      const dkey = 'sort' + key[0].toUpperCase() + key.slice(1);
      const rows = [...tbody.querySelectorAll('tr')];

      rows.sort((a, b) => {
        let av = a.dataset[dkey], bv = b.dataset[dkey];
        if (key === 'name' || key === 'date') {
          av = av || ''; bv = bv || '';
          return asc ? av.localeCompare(bv) : bv.localeCompare(av);
        }
        av = +(av || 0); bv = +(bv || 0);
        return asc ? av - bv : bv - av;
      });

      rows.forEach((row, i) => {
        row.style.animation = 'none'; // prevent fadeIn restart
        const nc = row.querySelector('.td-num');
        if (nc) nc.textContent = i + 1;
      });
      rows.forEach(row => tbody.appendChild(row));
    });
  });
}

// ─── Render results ────────────────────────────────────────
function renderResults(results, query) {
  const area = document.getElementById('results-area');
  area.innerHTML = '';

  if (!results || results.length === 0) {
    area.innerHTML = `<div class="empty-state"><div class="icon">🔍</div><h2>Ничего не найдено</h2><p>По запросу «${esc(query)}» результатов не найдено.</p></div>`;
    return;
  }

  for (const result of results) {
    if (result.error) {
      const d = document.createElement('div');
      d.className = 'error-box';
      d.textContent = `⚠ ${result.source}: ${result.error}`;
      area.appendChild(d);
      continue;
    }

    if (!result.results || result.results.length === 0) {
      const d = document.createElement('div');
      d.className = 'empty-state';
      d.innerHTML = `<div class="icon">🔍</div><h2>${esc(result.source)}: Ничего не найдено</h2><p>По запросу «${esc(query)}» результатов не найдено.</p>`;
      area.appendChild(d);
      continue;
    }

    // Status bar
    const status = document.createElement('div');
    status.className = 'status';
    const icoName = (result.source || '').split('.')[0];
    status.innerHTML = `<span>Запрос: <strong>${esc(result.query || query)}</strong></span>
      <span class="count">${result.count} результатов</span>
      <span class="source"><span class="dot"></span>${esc(result.source)}</span>`;
    area.appendChild(status);

    // Table
    const wrap  = document.createElement('div');
    wrap.className = 'table-wrap';

    const table = document.createElement('table');
    const thead = document.createElement('thead');
    thead.innerHTML = `<tr>
      <th>#</th>
      <th class="th-ico"></th>
      <th data-sortable="name">Название</th>
      <th data-sortable="size">Размер</th>
      <th data-sortable="seeds">↑ Сиды</th>
      <th data-sortable="peers">↓ Пиры</th>
      <th data-sortable="date">Дата</th>
      <th>Магнет</th>
    </tr>`;
    table.appendChild(thead);

    const tbody = document.createElement('tbody');
    result.results.forEach((t, i) => {
      const tr = document.createElement('tr');
      tr.style.animationDelay = (i * 30) + 'ms';
      // Store sort values as data attributes — avoids DOM text parsing on each click
      tr.dataset.sortName  = (t.name  || '').toLowerCase();
      tr.dataset.sortSize  = parseSize(t.size);
      tr.dataset.sortSeeds = parseNum(t.seeds);
      tr.dataset.sortPeers = parseNum(t.peers);
      tr.dataset.sortDate  = t.date || '';

      tr.innerHTML = `
        <td class="td-num">${i + 1}</td>
        <td class="td-ico"></td>
        <td class="td-name"><div class="torrent-name"></div></td>
        <td class="td-size">${esc(t.size  || '—')}</td>
        <td class="td-seeds">${esc(t.seeds || '—')}</td>
        <td class="td-peers">${esc(t.peers || '—')}</td>
        <td class="td-date">${esc(t.date  || '—')}</td>
        <td class="td-magnet"></td>
      `;

      // Build icon cell — use per-torrent source, fall back to table source
      const icoCell = tr.querySelector('.td-ico');
      const torrentIco = ((t.source || result.source) || '').split('.')[0];
      if (torrentIco) {
        const icoImg = document.createElement('img');
        icoImg.src    = '/ico/' + torrentIco + '.ico';
        icoImg.width  = 16;
        icoImg.height = 16;
        icoImg.title  = t.source || result.source || '';
        icoImg.style.cssText = 'display:block;vertical-align:middle';
        icoImg.onerror = function() { this.style.display = 'none'; };
        icoCell.appendChild(icoImg);
      }

      // Build name cell via DOM to keep URL safe from XSS
      const nameDiv = tr.querySelector('.torrent-name');
      if (t.url) {
        const a = document.createElement('a');
        a.href = t.url;
        a.target = '_blank';
        a.rel = 'noopener noreferrer';
        a.textContent = t.name || '';
        nameDiv.appendChild(a);
      } else {
        nameDiv.appendChild(document.createTextNode(t.name || ''));
      }

      // Build magnet cell via DOM (keeps href safe from innerHTML XSS)
      const cell   = tr.querySelector('.td-magnet');
      const link   = document.createElement('a');
      link.className = 'btn-magnet';
      link.href      = t.magnet || '#';
      link.title     = 'Открыть магнет-ссылку';
      link.innerHTML = SVG_MAGNET + ' MAGNET';
      cell.appendChild(link);

      const cpBtn = document.createElement('button');
      cpBtn.className = 'btn-copy';
      cpBtn.title     = 'Скопировать';
      cpBtn.innerHTML = SVG_COPY;
      cpBtn.addEventListener('click', () => copyMagnet(cpBtn, t.magnet));
      cell.appendChild(cpBtn);

      const tsBtn = document.createElement('button');
      tsBtn.className    = 'btn-ts';
      tsBtn.title        = 'Добавить в TorrServer';
      tsBtn.style.display = tsHasUrl() ? '' : 'none';
      tsBtn.innerHTML    = SVG_TS_SEND;
      tsBtn.addEventListener('click', () => addToTorrServer(tsBtn, t.magnet));
      cell.appendChild(tsBtn);

      if (ENABLE_PLAYBACK) {
        const playBtn = document.createElement('button');
        playBtn.className     = 'btn-play';
        playBtn.title         = 'Воспроизвести через TorrServer';
        playBtn.style.display = tsHasUrl() ? '' : 'none';
        playBtn.innerHTML     = SVG_TS_PLAY;
        playBtn.addEventListener('click', () => playOnTorrServer(playBtn, t.magnet));
        cell.appendChild(playBtn);
      }

      tbody.appendChild(tr);
    });

    table.appendChild(tbody);
    wrap.appendChild(table);
    area.appendChild(wrap);

    initTableSorting(table);
  }
}

// ─── AJAX search ───────────────────────────────────────────
async function doSearch(query, trackerList) {
  document.getElementById('searchBtn').classList.add('searching');

  const sortEl = document.querySelector('input[name="sort"]:checked');
  const sort = sortEl ? parseInt(sortEl.value, 10) : 0;

  try {
    const resp = await fetch('/api/ui/search', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ query, trackers: trackerList || [], sort })
    });
    const data = await resp.json();
    if (!resp.ok) {
      showError(data.error || 'Ошибка запроса');
    } else {
      renderResults(data, query);
    }
  } catch(e) {
    showError('Ошибка соединения');
  } finally {
    document.getElementById('searchBtn').classList.remove('searching');
  }
}

function showError(msg) {
  const area = document.getElementById('results-area');
  area.innerHTML = '';
  const d = document.createElement('div');
  d.className = 'error-box';
  d.textContent = '⚠ ' + msg;
  area.appendChild(d);
}

function showWelcome() {
  document.getElementById('results-area').innerHTML = `
    <div class="welcome">
      <h2>Поиск по торрент-трекерам</h2>
      <p>Введите название фильма, сериала, игры или любого контента.<br>
      Программа найдёт раздачи и покажет магнет-ссылки.</p>
      <div class="sources">
        <div class="source-tag"><span class="active-dot"></span>Готово к поиску</div>
      </div>
    </div>`;
}

// ─── Form submit ───────────────────────────────────────────
document.getElementById('searchForm').addEventListener('submit', function(e) {
  e.preventDefault();

  if (TRACKERS.length > 0 && enabledTrackers.size === 0) {
    const bar = document.getElementById('trackers-bar');
    bar.classList.remove('bar-error');
    void bar.offsetWidth;
    bar.classList.add('bar-error');
    setTimeout(() => bar.classList.remove('bar-error'), 500);
    return;
  }

  const query = document.querySelector('.search-input').value.trim();
  if (!query) return;

  const selected = [...enabledTrackers];
  doSearch(query, selected.length < TRACKERS.length ? selected : []);
});

// ─── TorrServer ────────────────────────────────────────────
function tsGet()  { return { url: localStorage.getItem('ts_url') || '', login: localStorage.getItem('ts_login') || '', password: localStorage.getItem('ts_password') || '' }; }
function tsHasUrl() { return !!localStorage.getItem('ts_url'); }

function tsSet(url, login, password) {
  url ? localStorage.setItem('ts_url', url) : localStorage.removeItem('ts_url');
  login ? localStorage.setItem('ts_login', login) : localStorage.removeItem('ts_login');
  password ? localStorage.setItem('ts_password', password) : localStorage.removeItem('ts_password');
}

function tsUpdateBtns() {
  const vis = tsHasUrl();
  document.querySelectorAll('.btn-ts').forEach(b => { b.style.display = vis ? '' : 'none'; });
  if (ENABLE_PLAYBACK) {
    document.querySelectorAll('.btn-play').forEach(b => { b.style.display = vis ? '' : 'none'; });
  }
}

// Modal
(function() {
  const overlay = document.getElementById('ts-overlay');
  const urlInp  = document.getElementById('ts-url');
  const loginInp = document.getElementById('ts-login');
  const passInp = document.getElementById('ts-password');
  const errEl   = document.getElementById('ts-modal-err');

  function open() {
    const s = tsGet();
    urlInp.value   = s.url;
    loginInp.value = s.login;
    passInp.value  = s.password;
    errEl.textContent = '';
    overlay.classList.remove('hidden');
    urlInp.focus();
  }
  function close() { overlay.classList.add('hidden'); }

  document.getElementById('torrserver-btn').addEventListener('click', open);
  document.getElementById('ts-modal-x').addEventListener('click', close);
  document.getElementById('ts-modal-cancel').addEventListener('click', close);
  overlay.addEventListener('click', function(e) { if (e.target === overlay) close(); });

  document.getElementById('ts-pass-eye').addEventListener('click', function() {
    passInp.type = passInp.type === 'password' ? 'text' : 'password';
  });

  document.getElementById('ts-modal-save').addEventListener('click', function() {
    const url = urlInp.value.trim();
    if (url) {
      try { new URL(url); } catch(e) {
        errEl.textContent = 'Некорректный URL сервера';
        urlInp.focus();
        return;
      }
    }
    tsSet(url, loginInp.value.trim(), passInp.value);
    tsUpdateBtns();
    close();
  });
})();

async function addToTorrServer(btn, magnet) {
  const s = tsGet();
  if (!s.url || !magnet) return;

  let torUrl, authHeader = '';
  try {
    const u = new URL(s.url);
    if (u.username || u.password) {
      authHeader = 'Basic ' + btoa(decodeURIComponent(u.username) + ':' + decodeURIComponent(u.password));
      u.username = ''; u.password = '';
    }
    torUrl = u.origin + '/torrents';
  } catch(e) {
    btn.title = 'Некорректный URL TorrServer';
    return;
  }
  if (!authHeader && (s.login || s.password)) {
    authHeader = 'Basic ' + btoa(s.login + ':' + s.password);
  }

  const headers = { 'Content-Type': 'application/json' };
  if (authHeader) headers['Authorization'] = authHeader;

  const origTitle = btn.title;
  btn.disabled = true;
  btn.innerHTML = SVG_TS_SPIN;
  btn.title = 'Отправка…';

  try {
    const res = await fetch(torUrl, {
      method: 'POST',
      headers,
      body: JSON.stringify({ action: 'add', link: magnet, save_to_db: true })
    });

    if (res.ok) {
      btn.innerHTML = SVG_CHECK;
      btn.classList.add('ts-ok');
      btn.title = 'Торрент отправлен на TorrServer';
      setTimeout(() => {
        btn.innerHTML = SVG_TS_SEND;
        btn.classList.remove('ts-ok');
        btn.disabled = false;
        btn.title = origTitle;
      }, 1800);
    } else {
      const msg = res.status === 401 ? 'Ошибка авторизации: проверьте логин и пароль'
                : res.status === 403 ? 'CORS: разрешите запросы с этого сайта в настройках TorrServer'
                : 'Ошибка сервера: ' + res.status;
      btn.innerHTML = SVG_TS_SEND;
      btn.classList.add('ts-err');
      btn.disabled = false;
      btn.title = msg;
      setTimeout(() => { btn.classList.remove('ts-err'); btn.title = origTitle; }, 3000);
    }
  } catch(e) {
    btn.innerHTML = SVG_TS_SEND;
    btn.classList.add('ts-err');
    btn.disabled = false;
    btn.title = 'Ошибка сети. Проверьте URL и CORS.';
    setTimeout(() => { btn.classList.remove('ts-err'); btn.title = origTitle; }, 3000);
  }
}

// ─── Admin link visibility ─────────────────────────────────
(function() {
  const link = document.getElementById('admin-link');
  if (!link) return;

  if (ADMIN_HIDDEN) {
    if (sessionStorage.getItem('adminVisible') === '1') {
      // already unlocked in this session
    } else {
      link.style.display = 'none';

      let debounceTimer = null;
      document.querySelector('.search-input').addEventListener('input', function() {
        clearTimeout(debounceTimer);
        const val = this.value;
        debounceTimer = setTimeout(async function() {
          try {
            const resp = await fetch('/api/admin-check', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ phrase: val })
            });
            const data = await resp.json();
            if (data.ok) {
              link.style.display = '';
              sessionStorage.setItem('adminVisible', '1');
            }
          } catch(e) {}
        }, 400);
      });
    }
  }
})();
